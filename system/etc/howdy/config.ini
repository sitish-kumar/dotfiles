# Howdy (face unlock) config — installed to /etc/howdy/config.ini by system-setup.sh.
#
# MACHINE-SPECIFIC: [video] device_path is the IR/webcam node and differs per laptop.
# After installing howdy-git on a new machine:
#   1) find the IR camera:  ls /dev/video*  (try each; howdy test  helps)
#   2) set device_path below to it
#   3) enroll your face:    sudo howdy add
# Face models live in /etc/howdy/models and are biometric — they are NOT vendored
# and must be re-enrolled per machine.
[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
certainty = 4.5
timeout = 4
device_path = /dev/video2
warn_no_device = true
max_height = 320
frame_width = 340
frame_height = 340
dark_threshold = 100
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1
device_fps = 15
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
