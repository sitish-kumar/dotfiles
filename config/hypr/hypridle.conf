$lock_cmd = hyprctl dispatch 'hl.dsp.global("quickshell:lock")' & pidof qs quickshell hyprlock || hyprlock
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch global quickshell:lockFocus
    inhibit_sleep = 3
}

# NOTE: the three `timeout` values below are managed from Settings > Power. The markers
# (@idle:lock / @idle:screenoff / @idle:suspend) let apply-idle.sh rewrite just the
# number; don't remove them. Edit values in Settings, not here (changes get overwritten).
listener {
    timeout = 300 # @idle:lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # @idle:screenoff
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 900 # @idle:suspend
    on-timeout = $suspend_cmd
}
